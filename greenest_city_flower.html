<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenest City Projects — Natural Wonders of Vancouver</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { display: flex; align-items: center; justify-content: center; gap: 3rem; flex-wrap: wrap; }
  .panel { width: 210px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .p-goal  { font-size: 14px; font-weight: 500; line-height: 1.3; color: #333; }
  .p-count { font-size: 42px; font-weight: 500; line-height: 1; color: #1a1a1a; }
  .p-sub   { font-size: 11px; color: #888780; }
  .p-hr    { border: none; border-top: 0.5px solid #D3D1C7; margin: 4px 0; }
  .p-types { display: flex; flex-direction: column; gap: 5px; }
  .p-type  { font-size: 12px; color: #5F5E5A; }
</style>
</head>
<body>

<div class="container">
  <div id="svg-wrap"></div>
  <div class="panel" id="panel"></div>
</div>

<script>
const goalColors = {
  "Local-Food":           "#6083FF",
  "Clean-Air":            "#7AD3FF",
  "Lighter-Footprint":    "#60E7FF",
  "Green-Buildings":      "#60FFF5",
  "Access-to-Nature":     "#AAFF87",
  "Zero-Waste":           "#9AFFB6",
  "Green-Transportation": "#ACFFE9",
  "Green-Economy":        "#FDE3FF",
  "Climate-Leadership":   "#E7CDFF"
};

const goalNames = {
  "Local-Food":           "Local Food",
  "Clean-Air":            "Clean Air",
  "Lighter-Footprint":    "Lighter Footprint",
  "Green-Buildings":      "Green Buildings",
  "Access-to-Nature":     "Access to Nature",
  "Zero-Waste":           "Zero Waste",
  "Green-Transportation": "Green Transportation",
  "Green-Economy":        "Green Economy",
  "Climate-Leadership":   "Climate Leadership"
};

const goalOrder = [
  "Local-Food", "Clean-Air", "Lighter-Footprint", "Green-Buildings",
  "Access-to-Nature", "Zero-Waste", "Green-Transportation",
  "Green-Economy", "Climate-Leadership"
];

const cx = 160, cy = 160;
const L = 118, W = 34, SWIRL = 18;

function leafPath() {
  return `M 0 0
    C ${W*0.8} ${-L*0.1}, ${W} ${-L*0.35}, ${W*0.55} ${-L*0.6}
    C ${W*0.2} ${-L*0.82}, 0 ${-L*0.95}, 0 ${-L}
    C 0 ${-L*0.95}, ${-W*0.2} ${-L*0.82}, ${-W*0.55} ${-L*0.6}
    C ${-W} ${-L*0.35}, ${-W*0.8} ${-L*0.1}, 0 0 Z`;
}

function midrib() {
  return `M 0 -4 Q 0 ${-L*0.5} 0 ${-L*0.88}`;
}

d3.csv("greenest_city_projects.csv").then(raw => {

  const goalMap = {};
  const typeMap = {};

  raw.forEach(d => {
    const goal = d.category2 ? d.category2.trim() : null;
    const type = d.category1 ? d.category1.trim() : null;
    if (!goal || !goalOrder.includes(goal)) return;
    goalMap[goal] = (goalMap[goal] || 0) + 1;
    if (!typeMap[goal]) typeMap[goal] = {};
    if (type) typeMap[goal][type] = (typeMap[goal][type] || 0) + 1;
  });

  const goals = goalOrder
    .filter(g => goalMap[g])
    .map(g => ({
      key:   g,
      name:  goalNames[g],
      count: goalMap[g],
      color: goalColors[g],
      types: Object.entries(typeMap[g] || {}).sort((a,b) => b[1]-a[1])
    }));

  const total = goals.reduce((s,g) => s + g.count, 0);
  const N = goals.length;

  const svg = d3.select('#svg-wrap').append('svg')
    .attr('width', 320).attr('height', 320)
    .attr('viewBox', '0 0 320 320')
    .style('cursor', 'pointer')
    .style('overflow', 'visible');

  let selected = null;
  const groups = [];

  goals.forEach((g, i) => {
    const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
    const deg   = angle * 180 / Math.PI + 90 + SWIRL;

    const grp = svg.append('g')
      .attr('transform', `translate(${cx},${cy}) rotate(${deg})`)
      .attr('cursor', 'pointer')
      .attr('opacity', 0.9);

    grp.append('path')
      .attr('d', leafPath())
      .attr('fill', g.color)
      .attr('stroke', 'rgba(255,255,255,0.7)')
      .attr('stroke-width', 1.5);

    grp.append('path')
      .attr('d', midrib())
      .attr('fill', 'none')
      .attr('stroke', 'rgba(255,255,255,0.4)')
      .attr('stroke-width', 1)
      .attr('stroke-linecap', 'round');

    grp.on('mouseenter', function() {
      if (selected !== i) d3.select(this).attr('opacity', 1).raise();
    }).on('mouseleave', function() {
      if (selected !== i) d3.select(this).attr('opacity', selected === null ? 0.9 : 0.15);
    }).on('click', function(event) {
      event.stopPropagation();
      if (selected === i) { selected = null; resetAll(); showEmpty(); }
      else { selected = i; highlightSelected(i); showInfo(g); }
    });

    groups.push({ grp, i, deg });
  });

  svg.append('circle')
    .attr('cx', cx).attr('cy', cy).attr('r', 22)
    .attr('fill', '#ffffff').attr('stroke', '#D3D1C7').attr('stroke-width', 0.5);
  svg.append('text')
    .attr('x', cx).attr('y', cy - 6)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-size', 15).attr('font-weight', 500).attr('fill', '#1A1A1A')
    .text(total);
  svg.append('text')
    .attr('x', cx).attr('y', cy + 10)
    .attr('text-anchor', 'middle').attr('font-size', 8).attr('fill', '#888780')
    .text('projects');

  function resetAll() {
    groups.forEach(({grp, deg}) => {
      grp.attr('opacity', 0.9).attr('transform', `translate(${cx},${cy}) rotate(${deg})`);
    });
  }

  function highlightSelected(idx) {
    groups.forEach(({grp, i}) => {
      if (i === idx) grp.attr('opacity', 1).raise();
      else grp.attr('opacity', 0.14);
    });
  }

  function showEmpty() {
    document.getElementById('panel').innerHTML = '';
  }

  function showInfo(g) {
    const pct  = Math.round((g.count / total) * 100);
    const rows = g.types.map(([type, n]) => `
      <div class="p-type">${type} · <strong>${n}</strong></div>`).join('');
    document.getElementById('panel').innerHTML = `
      <p class="p-goal">${g.name}</p>
      <p class="p-count">${g.count}</p>
      <p class="p-sub">projects · ${pct}% of total</p>
      <hr class="p-hr">
      <div class="p-types">${rows}</div>`;
  }

  document.addEventListener('click', () => {
    selected = null;
    resetAll();
    showEmpty();
  });

}).catch(() => {
  document.getElementById('panel').innerHTML =
    '<p style="color:#c03828;font-size:12px">Could not load CSV.<br>Run: python3 -m http.server 8000<br>from the project folder.</p>';
});
</script>
</body>
</html>
