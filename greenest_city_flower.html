<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenest City Projects — Natural Wonders of Vancouver</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { display: flex; align-items: center; justify-content: center; gap: 3rem; flex-wrap: wrap; }
  .panel { width: 210px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .p-goal  { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .p-count { font-size: 42px; font-weight: 500; line-height: 1; color: #1a1a1a; }
  .p-sub   { font-size: 11px; color: #888780; }
  .p-hr    { border: none; border-top: 0.5px solid #D3D1C7; margin: 4px 0; }
  .p-types { display: flex; flex-direction: column; gap: 5px; }
  .p-type  { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #5F5E5A; }
  .p-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

</style>
</head>
<body>

<div class="container">
  <div id="svg-wrap"></div>
  <div class="panel" id="panel"></div>
</div>


<script>
const goals = [
  { name:"Local Food",           count:173, color:"#6083FF" },
  { name:"Clean Air",            count:33,  color:"#7AD3FF" },
  { name:"Lighter Footprint",    count:30,  color:"#60E7FF" },
  { name:"Green Buildings",      count:25,  color:"#60FFF5" },
  { name:"Access to Nature",     count:24,  color:"#AAFF87" },
  { name:"Zero Waste",           count:17,  color:"#9AFFB6" },
  { name:"Green Transportation", count:13,  color:"#ACFFE9" },
  { name:"Green Economy",        count:5,   color:"#FDE3FF" },
  { name:"Climate Leadership",   count:3,   color:"#E7CDFF" },
];

const types = {
  "Local Food":            [["Greenest City Fund",98],["Private",52],["City",14],["City Studio",9]],
  "Clean Air":             [["Private",18],["City",10],["Greenest City Fund",5]],
  "Lighter Footprint":     [["Greenest City Fund",18],["Private",8],["City Studio",4]],
  "Green Buildings":       [["Private",16],["City",7],["Greenest City Fund",2]],
  "Access to Nature":      [["Greenest City Fund",12],["City",8],["Private",4]],
  "Zero Waste":            [["Greenest City Fund",9],["Private",5],["City",3]],
  "Green Transportation":  [["City",7],["Greenest City Fund",4],["Private",2]],
  "Green Economy":         [["City",3],["Private",2]],
  "Climate Leadership":    [["City",3]],
};

const typeColors = {
  "Greenest City Fund": "#1D9E75",
  "Private":            "#D85A30",
  "City":               "#185FA5",
  "City Studio":        "#7F77DD"
};

const total = goals.reduce((s,g) => s + g.count, 0);
const N = goals.length;
const cx = 160, cy = 160;
const L = 118, W = 34, SWIRL = 18;

function leafPath() {
  return `M 0 0
    C ${W*0.8} ${-L*0.1}, ${W} ${-L*0.35}, ${W*0.55} ${-L*0.6}
    C ${W*0.2} ${-L*0.82}, 0 ${-L*0.95}, 0 ${-L}
    C 0 ${-L*0.95}, ${-W*0.2} ${-L*0.82}, ${-W*0.55} ${-L*0.6}
    C ${-W} ${-L*0.35}, ${-W*0.8} ${-L*0.1}, 0 0 Z`;
}

function midrib() {
  return `M 0 -4 Q 0 ${-L*0.5} 0 ${-L*0.88}`;
}

const svg = d3.select('#svg-wrap').append('svg')
  .attr('width', 320).attr('height', 320)
  .attr('viewBox', '0 0 320 320')
  .style('cursor', 'pointer')
  .style('overflow', 'visible');



let selected = null;
const groups = [];

goals.forEach((g, i) => {
  const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
  const deg   = angle * 180 / Math.PI + 90 + SWIRL;

  const grp = svg.append('g')
    .attr('transform', `translate(${cx},${cy}) rotate(${deg})`)
    .attr('cursor', 'pointer')
    .attr('opacity', 0.9);

  grp.append('path')
    .attr('d', leafPath())
    .attr('fill', g.color)
    .attr('stroke', 'rgba(255,255,255,0.7)')
    .attr('stroke-width', 1.5);

  grp.append('path')
    .attr('d', midrib())
    .attr('fill', 'none')
    .attr('stroke', 'rgba(255,255,255,0.4)')
    .attr('stroke-width', 1)
    .attr('stroke-linecap', 'round');

  grp.on('mouseenter', function() {
    if (selected !== i) d3.select(this).attr('opacity', 1).raise();
  }).on('mouseleave', function() {
    if (selected !== i) d3.select(this).attr('opacity', selected === null ? 0.9 : 0.15);
  }).on('click', function(event) {
    event.stopPropagation();
    if (selected === i) { selected = null; resetAll(); showEmpty(); }
    else { selected = i; highlightSelected(i); showInfo(g); }
  });

  groups.push({ grp, i });
});

svg.append('circle')
  .attr('cx', cx).attr('cy', cy).attr('r', 22)
  .attr('fill', '#ffffff').attr('stroke', '#D3D1C7').attr('stroke-width', 0.5);
svg.append('text')
  .attr('x', cx).attr('y', cy - 6)
  .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
  .attr('font-size', 15).attr('font-weight', 500).attr('fill', '#1A1A1A')
  .text(total);
svg.append('text')
  .attr('x', cx).attr('y', cy + 10)
  .attr('text-anchor', 'middle').attr('font-size', 8).attr('fill', '#888780')
  .text('projects');

function resetAll() { groups.forEach(({grp, i}) => { const g = goals[i]; const angle = (i / N) * 2 * Math.PI - Math.PI / 2; const deg = angle * 180 / Math.PI + 90 + SWIRL; grp.attr('opacity', 0.9).attr('transform', `translate(${cx},${cy}) rotate(${deg})`); }); }
function highlightSelected(idx) {
  groups.forEach(({grp, i}) => {
    if (i === idx) grp.attr('opacity', 1).raise();
    else grp.attr('opacity', 0.14);
  });
}
// Click anywhere outside the flower resets it
document.addEventListener('click', () => {
  selected = null;
  resetAll();
  showEmpty();
});

function showEmpty() {
  document.getElementById('panel').innerHTML = '';
}
function showInfo(g) {
  const pct  = Math.round((g.count / total) * 100);
  const t    = types[g.name] || [];
  const rows = t.map(([type, n]) => `
    <div class="p-type">
      <span>${type} · <strong>${n}</strong></span>
    </div>`).join('');
  document.getElementById('panel').innerHTML = `
    <p class="p-goal" style="color:#333">${g.name}</p>
    <p class="p-count">${g.count}</p>
    <p class="p-sub">projects · ${pct}% of total</p>
    <hr class="p-hr">
    <div class="p-types">${rows}</div>`;
}


</script>
</body>
</html>
